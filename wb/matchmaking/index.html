<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Balancing Demo</title>
    <style>
        body {
            background-color: #333;
            color: #fff;
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }
        #header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }
        #inputWrapper {
            position: relative;
            flex: 1;
        }
        #playerInput {
            width: 100%;
            padding: 10px;
            background: #444;
            border: 1px solid #555;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #addPlayer, #addGuest, #addRandom {
            padding: 10px 20px;
            background: #007bff;
            border: none;
            color: #fff;
            border-radius: 5px;
            margin-left: 10px;
            cursor: pointer;
        }
        #addPlayer:hover, #addGuest:hover, #addRandom:hover {
            background: #0056b3;
        }
        #playerCount {
            display: inline-block;
            margin-left: 10px;
            background: #555;
            padding: 5px 10px;
            border-radius: 50px;
            font-size: 14px;
        }
        #playerCount.invalid {
            background: #ff0000;
            color: #fff;
        }
        #searchResults {
            position: absolute;
            top: 100%;
            left: 0;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: #444;
            border: 1px solid #555;
            border-radius: 5px;
            display: none;
            z-index: 10;
        }
        #searchResults ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        #searchResults li {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #555;
        }
        #searchResults li:hover {
            background: #555;
        }
        #triangle-container {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
        }
        #triangleCanvas {
            border: 1px solid #555;
            background: #444;
            border-radius: 5px;
            cursor: crosshair;
        }
        #weightTable {
            border-collapse: collapse;
        }
        #weightTable td, #weightTable th {
            padding: 5px 10px;
            border: 1px solid #555;
            text-align: center;
        }
        #resetWeights {
            margin-top: 10px;
            padding: 5px 10px;
            background: #6c757d;
            border: none;
            color: #fff;
            border-radius: 3px;
            cursor: pointer;
        }
        #resetWeights:hover {
            background: #5a6268;
        }
        #playerPool {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding: 10px;
            background: #444;
            border-radius: 5px;
            min-height: 100px;
        }
        .playerBubble {
            background: #555;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            text-align: center;
            width: 150px;
        }
        .playerBubble .name {
            font-size: 16px;
            font-weight: bold;
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .playerBubble .uid {
            font-size: 12px;
            color: #aaa;
        }
        .playerBubble .elos {
            font-size: 10px;
            color: #ccc;
        }
        .playerBubble.selected {
            border: 2px solid #28a745;
            box-shadow: 0 0 10px #28a745;
        }
        #options {
            margin-bottom: 20px;
        }
        #priority {
            padding: 10px;
            background: #444;
            border: 1px solid #555;
            color: #fff;
            border-radius: 5px;
            margin-right: 10px;
        }
        .slider-container {
            display: flex;
            align-items: center;
            margin: 10px 0;
        }
        .slider-label-left {
            width: 100px;
            text-align: left;
        }
        .slider-label-right {
            width: 100px;
            text-align: right;
        }
        input[type="range"] {
            flex: 1;
            margin: 0 10px;
        }
        #go {
            padding: 10px 40px;
            background: #28a745;
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
            font-size: 18px;
        }
        #go:hover {
            background: #218838;
        }
        #progress {
            margin-bottom: 20px;
        }
        #results {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            background: #444;
            padding: 20px;
            border-radius: 5px;
        }
        #teamA, #teamB {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        #teamA h3, #teamB h3 {
            text-align: center;
            margin: 0;
        }
        .teamBubble {
            background: #555;
            padding: 10px;
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: default;
        }
        .teamBubble.clickable {
            cursor: pointer;
        }
        .teamBubble.clickable:hover {
            background: #666;
        }
        .teamBubble .left {
            text-align: left;
        }
        .teamBubble .name {
            font-size: 16px;
            font-weight: bold;
        }
        .teamBubble .uid {
            font-size: 12px;
            color: #aaa;
        }
        .teamBubble .right {
            text-align: right;
            font-size: 14px;
        }
        #balances {
            width: 100%;
            margin-top: 20px;
            text-align: center;
        }
        #modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
        }
        #modalContent {
            background: #444;
            padding: 20px;
            border-radius: 5px;
            width: 300px;
            position: relative;
        }
        #modal label {
            display: block;
            margin-top: 10px;
        }
        #closeModal {
            position: absolute;
            top: 10px;
            right: 10px;
            cursor: pointer;
            font-size: 20px;
        }
        #modal input {
            width: calc(100% - 22px);
            padding: 10px;
            margin: 5px 0 10px 0;
            background: #555;
            border: 1px solid #666;
            color: #fff;
            border-radius: 5px;
            box-sizing: border-box;
        }
        #modalButtons {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        #modalButtons button {
            padding: 10px 20px;
            background: #007bff;
            border: none;
            color: #fff;
            border-radius: 5px;
            cursor: pointer;
        }
        #modalButtons button:hover {
            background: #0056b3;
        }
        #doneBtn {
            background: #28a745;
        }
        #doneBtn:hover {
            background: #218838;
        }
    </style>
</head>
<body>
    <div id="header">
        <div id="inputWrapper">
            <input id="playerInput" placeholder="Enter Name or UID">
            <div id="searchResults"></div>
        </div>
        <button id="addPlayer">Add Player</button>
        <button id="addGuest">Add Guest</button>
        <button id="addRandom">Add Random</button>
    </div>
    <div id="playerPool"></div>
    <div id="options">
        <select id="priority">
            <option value="equal_teams">Prioritize equal teams</option>
            <option value="equal_balancing">Prioritize equal balancing</option>
        </select>
        <div class="slider-container">
            <label for="maxDiff">Max team size difference:</label>
            <input type="range" id="maxDiff" min="1" max="5" value="5">
            <span id="maxDiffVal">5</span>
        </div>
        <div id="triangle-container">
            <canvas id="triangleCanvas" width="200" height="180"></canvas>
            <div>
                <table id="weightTable">
                    <tr><th>Metric</th><th>Weight</th></tr>
                    <tr><td>Kills ELO</td><td id="valK">33%</td></tr>
                    <tr><td>Games ELO</td><td id="valG">33%</td></tr>
                    <tr><td>Wins</td><td id="valW">33%</td></tr>
                </table>
                <button id="resetWeights">Reset 33/33/33</button>
            </div>
        </div>
        <button id="go">GO</button>
        <div id="playerCount">0/16</div>
    </div>
    <div id="progress" style="display: none;">
        <progress id="progBar" value="0" max="100"></progress>
    </div>
    <div id="results" style="display: none;">
        <div id="teamA">
            <h3>Team A</h3>
        </div>
        <div id="teamB">
            <h3>Team B</h3>
        </div>
        <div id="balances"></div>
    </div>
    <div id="modal">
        <div id="modalContent">
            <span id="closeModal">&times;</span>
            <label>Name:</label>
            <input id="guestName" placeholder="Guest name">
            <label>Kills ELO:</label>
            <input id="guestKills" type="number" placeholder="1500">
            <label>Games ELO:</label>
            <input id="guestGames" type="number" placeholder="1500">
            <label>Wins:</label>
            <input id="guestWins" type="number" placeholder="10">
            <div id="modalButtons">
                <button id="randomize">Randomize</button>
                <button id="doneBtn">Done</button>
            </div>
        </div>
    </div>

    <script>
        function debounce(func, delay) {
            let timeout;
            return (...args) => {
                clearTimeout(timeout);
                timeout = setTimeout(() => func(...args), delay);
            };
        }

        function gaussianRand(mean, std) {
            const u = 1 - Math.random();
            const v = Math.random();
            const z = Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
            return z * std + mean;
        }

        const players = []; // {uid, nick, squad, killsELO, gamesELO, wins, selected: false}
        const playerPool = document.getElementById('playerPool');
        const searchResults = document.getElementById('searchResults');
        const playerInput = document.getElementById('playerInput');
        const addPlayerBtn = document.getElementById('addPlayer');
        const addGuestBtn = document.getElementById('addGuest');
        const addRandomBtn = document.getElementById('addRandom');
        const playerCount = document.getElementById('playerCount');
        const maxDiffSlider = document.getElementById('maxDiff');
        const maxDiffVal = document.getElementById('maxDiffVal');
        // Removed importanceSlider
        const prioritySelect = document.getElementById('priority');
        const goBtn = document.getElementById('go');
        const progressDiv = document.getElementById('progress');
        const progBar = document.getElementById('progBar');
        const resultsDiv = document.getElementById('results');
        const teamA = document.getElementById('teamA');
        const teamB = document.getElementById('teamB');
        const balances = document.getElementById('balances');
        const modal = document.getElementById('modal');
        const closeModal = document.getElementById('closeModal');
        const guestName = document.getElementById('guestName');
        const guestKills = document.getElementById('guestKills');
        const guestGames = document.getElementById('guestGames');
        const guestWins = document.getElementById('guestWins');
        const randomizeBtn = document.getElementById('randomize');
        const doneBtn = document.getElementById('doneBtn');

        // Triangle UI
        const canvas = document.getElementById('triangleCanvas');
        const ctx = canvas.getContext('2d');
        const valK = document.getElementById('valK');
        const valG = document.getElementById('valG');
        const valW = document.getElementById('valW');
        const resetWeightsBtn = document.getElementById('resetWeights');

        // Vertices: Top (Kills), Bottom Right (Games), Bottom Left (Wins)
        // Canvas 200x180. Center roughly (100, 100).
        // Equilateral triangle side ~180.
        // H = 180 * sqrt(3)/2 ~= 155.
        // Top: (100, 10).
        // Bottom Y: 10 + 155 = 165.
        // Bottom Left: (100 - 90, 165) = (10, 165).
        // Bottom Right: (100 + 90, 165) = (190, 165).

        const vK = {x: 100, y: 20};
        const vW = {x: 20, y: 155};
        const vG = {x: 180, y: 155};

        let weights = {k: 0.333, g: 0.333, w: 0.333};
        let isDragging = false;

        function drawTriangle() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Triangle
            ctx.beginPath();
            ctx.moveTo(vK.x, vK.y);
            ctx.lineTo(vG.x, vG.y);
            ctx.lineTo(vW.x, vW.y);
            ctx.closePath();
            ctx.strokeStyle = '#ccc';
            ctx.stroke();
            ctx.fillStyle = '#555';
            ctx.fill();

            // Labels
            ctx.fillStyle = '#fff';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';
            ctx.fillText('Kills ELO', vK.x, vK.y - 10);
            ctx.fillText('Wins', vW.x - 10, vW.y + 15);
            ctx.fillText('Games ELO', vG.x + 10, vG.y + 15);

            // Current Point
            // P = wK*A + wG*B + wW*C
            const px = weights.k * vK.x + weights.g * vG.x + weights.w * vW.x;
            const py = weights.k * vK.y + weights.g * vG.y + weights.w * vW.y;

            ctx.beginPath();
            ctx.arc(px, py, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#28a745';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.stroke();
        }

        function updateWeightsFromPoint(x, y) {
            // Barycentric coordinates
            // Area of triangle ABC
            const area = 0.5 * (-vG.y * vW.x + vK.y * (-vG.x + vW.x) + vK.x * (vG.y - vW.y) + vG.x * vW.y);
            // Denominator
            const detT = (vG.y - vW.y) * (vK.x - vW.x) + (vW.x - vG.x) * (vK.y - vW.y);
            const lambda1 = ((vG.y - vW.y) * (x - vW.x) + (vW.x - vG.x) * (y - vW.y)) / detT;
            const lambda2 = ((vW.y - vK.y) * (x - vW.x) + (vK.x - vW.x) * (y - vW.y)) / detT;
            const lambda3 = 1 - lambda1 - lambda2;

            // Clamp values to [0, 1] and normalize
            // A simpler approach for UI dragging inside triangle:
            // Project point onto triangle if outside?
            // For now let's just clamp the lambdas.

            let wK = lambda1;
            let wG = lambda2;
            let wW = lambda3;

            // Simple clamping doesn't always work for barycentric to keep sum=1
            // But if we just use the calculated ones, it might be outside.
            // If outside, we should probably project to the edge.

            // For simplicity in this demo, let's just use the values and normalize non-negatives.
            wK = Math.max(0, wK);
            wG = Math.max(0, wG);
            wW = Math.max(0, wW);

            const total = wK + wG + wW;
            if (total === 0) return; // Should not happen inside triangle

            wK /= total;
            wG /= total;
            wW /= total;

            weights = {k: wK, g: wG, w: wW};
            updateWeightLabels();
            drawTriangle();
        }

        function updateWeightLabels() {
            valK.textContent = (weights.k * 100).toFixed(1) + '%';
            valG.textContent = (weights.g * 100).toFixed(1) + '%';
            valW.textContent = (weights.w * 100).toFixed(1) + '%';
        }

        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            updateWeightsFromPoint(e.clientX - rect.left, e.clientY - rect.top);
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                updateWeightsFromPoint(e.clientX - rect.left, e.clientY - rect.top);
            }
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            isDragging = true;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            updateWeightsFromPoint(touch.clientX - rect.left, touch.clientY - rect.top);
            e.preventDefault();
        }, {passive: false});

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                updateWeightsFromPoint(touch.clientX - rect.left, touch.clientY - rect.top);
                e.preventDefault();
            }
        }, {passive: false});


        resetWeightsBtn.addEventListener('click', () => {
            weights = {k: 0.333, g: 0.333, w: 0.333};
            updateWeightLabels();
            drawTriangle();
        });

        // Initialize
        drawTriangle();
        updateWeightLabels();

        maxDiffSlider.addEventListener('input', () => {
            maxDiffVal.textContent = maxDiffSlider.value;
        });

        playerInput.addEventListener('input', debounce(async () => {
            const value = playerInput.value.trim();
            if (value.length < 2) {
                searchResults.style.display = 'none';
                return;
            }
            const uidRegex = /^[0-9a-f]{24}$/i;
            if (uidRegex.test(value)) {
                searchResults.style.display = 'none';
                return;
            }
            await searchByName(value);
        }, 300));

        playerInput.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const value = playerInput.value.trim();
                const uidRegex = /^[0-9a-f]{24}$/i;
                if (uidRegex.test(value)) {
                    await addPlayer(value);
                    playerInput.value = '';
                }
            }
        });

        addPlayerBtn.addEventListener('click', async () => {
            const value = playerInput.value.trim();
            if (!value) return;
            const uidRegex = /^[0-9a-f]{24}$/i;
            if (uidRegex.test(value)) {
                await addPlayer(value);
                playerInput.value = '';
            } else {
                await searchByName(value);
            }
        });

        addGuestBtn.addEventListener('click', () => {
            randomizeGuest();
            modal.style.display = 'flex';
        });

        addRandomBtn.addEventListener('click', async () => {
            if (!cachedPlayers) {
                // Trigger fetch if not ready
                await searchByName("");
                if (!cachedPlayers) return; // Fetch failed
            }
            const randomPlayer = cachedPlayers[Math.floor(Math.random() * cachedPlayers.length)];
            await addPlayer(randomPlayer.uid);
        });

        closeModal.addEventListener('click', () => {
            modal.style.display = 'none';
        });

        randomizeBtn.addEventListener('click', randomizeGuest);

        doneBtn.addEventListener('click', () => {
            const name = guestName.value.trim() || 'Guest';
            const kills = parseFloat(guestKills.value) || 1500;
            const games = parseFloat(guestGames.value) || 1500;
            const wins = parseFloat(guestWins.value) || 10;
            const player = {
                uid: '',
                nick: name,
                squad: '',
                killsELO: kills,
                gamesELO: games,
                wins: wins,
                selected: false
            };
            players.push(player);
            renderPlayerBubble(player);
            modal.style.display = 'none';
        });

        function randomizeGuest() {
            const randNum = Math.floor(Math.random() * 1000).toString().padStart(3, '0');
            guestName.value = `Guest6${randNum}6`;
            guestKills.value = Math.round(gaussianRand(1500, 170));
            guestGames.value = Math.round(gaussianRand(1500, 190));
            // Wins: average 10, max ~35. Gaussian mean 10, std 8?
            let w = Math.round(gaussianRand(10, 8));
            if (w < 0) w = 0;
            if (w > 35) w = 35;
            guestWins.value = w;
        }

        let cachedPlayers = null;
        let fetchPromise = null;

        async function searchByName(query) {
            searchResults.innerHTML = '';

            if (!cachedPlayers) {
                if (!fetchPromise) {
                    fetchPromise = (async () => {
                        try {
                            const res = await fetch('https://wbv.vercel.app/api/search');
                            if (!res.ok) {
                                throw new Error(`HTTP error! status: ${res.status}`);
                            }
                            cachedPlayers = await res.json();
                        } catch (err) {
                            console.error('Error fetching player list:', err);
                            alert('Error searching players. See console for details.');
                            fetchPromise = null;
                        }
                    })();
                }
                await fetchPromise;
                if (!cachedPlayers) return;
            }

            const queryLower = query.toLowerCase();
            const matches = cachedPlayers.filter(p =>
                (p.nick && p.nick.toLowerCase().includes(queryLower)) ||
                (p.uid && p.uid.toLowerCase().includes(queryLower))
            ).slice(0, 20);

            if (matches.length === 0) {
                searchResults.style.display = 'none';
                return;
            }

            const ul = document.createElement('ul');
            matches.forEach(player => {
                const li = document.createElement('li');
                li.textContent = `${player.nick} (${player.uid})`;
                li.dataset.uid = player.uid;
                li.addEventListener('click', async () => {
                    await addPlayer(player.uid);
                    searchResults.innerHTML = '';
                    searchResults.style.display = 'none';
                    playerInput.value = '';
                });
                ul.appendChild(li);
            });
            searchResults.appendChild(ul);
            searchResults.style.display = 'block';
        }

        async function addPlayer(uid) {
            if (players.find(p => p.uid === uid)) {
                alert('Player already added.');
                return;
            }
            try {
                const res = await fetch(`https://wbv.vercel.app/api/get-player-stats?uid=${uid}`);
                const data = await res.json();

                let totalWins = 0;
                if (data.wins) {
                    totalWins = Object.values(data.wins).reduce((a, b) => a + b, 0);
                }

                const player = {
                    uid: data.uid,
                    nick: data.nick,
                    squad: data.squad || '',
                    killsELO: data.killsELO,
                    gamesELO: data.gamesELO,
                    wins: totalWins,
                    selected: false
                };
                players.push(player);
                renderPlayerBubble(player);
            } catch (err) {
                alert('Error fetching player.');
            }
        }

        function renderPlayerBubble(player) {
            const bubble = document.createElement('div');
            bubble.className = 'playerBubble';
            bubble.dataset.uid = player.uid || player.nick; // Unique key for guests
            const uidHTML = player.uid ? `<br><span class="uid">${player.uid}</span>` : '';
            const elosHTML = `<div class="elos">K: ${player.killsELO.toFixed(0)} G: ${player.gamesELO.toFixed(0)} W: ${player.wins.toFixed(0)}</div>`;
            bubble.innerHTML = `
                <span class="name">${player.squad ? `[${player.squad}] ` : ''}${player.nick}</span>${uidHTML}${elosHTML}
            `;
            bubble.addEventListener('click', () => {
                player.selected = !player.selected;
                bubble.classList.toggle('selected', player.selected);
                updatePlayerCount();
            });
            playerPool.appendChild(bubble);
        }

        function updatePlayerCount() {
            const selectedCount = players.filter(p => p.selected).length;
            playerCount.textContent = `${selectedCount}/16`;
            if (selectedCount <= 4 || selectedCount > 16) {
                playerCount.classList.add('invalid');
            } else {
                playerCount.classList.remove('invalid');
            }
        }

        goBtn.addEventListener('click', () => {
            const selectedPlayers = players.filter(p => p.selected);
            if (selectedPlayers.length < 2) {
                alert('Select at least 2 players.');
                return;
            }
            runSimulation(selectedPlayers);
        });

        async function runSimulation(selectedPlayers) {
            progressDiv.style.display = 'block';
            resultsDiv.style.display = 'none';
            goBtn.disabled = true;

            const N = selectedPlayers.length;

            // Calculate normalization factor for wins
            // Target: bring wins magnitude up to ELO magnitude (~1500)
            const avgELO = selectedPlayers.reduce((sum, p) => sum + (p.killsELO + p.gamesELO)/2, 0) / N;
            const avgWins = selectedPlayers.reduce((sum, p) => sum + p.wins, 0) / N;
            const winMultiplier = avgWins > 0 ? avgELO / avgWins : 1;

            const skills = selectedPlayers.map(p =>
                weights.k * p.killsELO +
                weights.g * p.gamesELO +
                weights.w * (p.wins * winMultiplier)
            );

            const total = skills.reduce((a, b) => a + b, 0);
            const cap = prioritySelect.value === 'equal_teams' ? 1 : parseInt(maxDiffSlider.value);
            const minTeam = 1; // Allow small teams
            const maxTeam = N - 1;
            const possibleSizes = [];
            for (let s = minTeam; s <= maxTeam; s++) {
                possibleSizes.push(s);
            }
            const allowedSizes = possibleSizes.filter(s => Math.abs(2 * s - N) <= cap);
            if (allowedSizes.length === 0) {
                alert('No valid team sizes.');
                resetUI();
                return;
            }

            let minScore = Infinity;
            let bestTeamA = [];
            const iterations = 100000;
            const updateInterval = 1000;

            for (let i = 0; i < iterations; i++) {
                if (i % updateInterval === 0) {
                    progBar.value = (i / iterations) * 100;
                    await new Promise(resolve => setTimeout(resolve, 0)); // Allow UI update
                }
                const sizeA = allowedSizes[Math.floor(Math.random() * allowedSizes.length)];
                const indices = [...Array(N).keys()];
                shuffle(indices);
                const teamAIndices = indices.slice(0, sizeA);
                const sumA = teamAIndices.reduce((sum, idx) => sum + skills[idx], 0);
                const score = Math.abs(2 * sumA - total);
                if (score < minScore) {
                    minScore = score;
                    bestTeamA = teamAIndices.slice();
                }
            }
            progBar.value = 100;

            displayResults(selectedPlayers, bestTeamA);
            resetUI();
        }

        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }

        function displayResults(selectedPlayers, bestTeamA) {
            teamA.innerHTML = '<h3>Team A</h3>';
            teamB.innerHTML = '<h3>Team B</h3>';
            const teamAMap = new Set(bestTeamA);
            let sumKillsA = 0, sumKillsB = 0;
            let sumGamesA = 0, sumGamesB = 0;
            let sumWinsA = 0, sumWinsB = 0;

            selectedPlayers.forEach((player, idx) => {
                const bubble = document.createElement('div');
                bubble.className = 'teamBubble';
                if (player.uid) {
                    bubble.classList.add('clickable');
                    bubble.addEventListener('click', () => {
                        window.open(`https://stats.warbrokers.io/players/i/${player.uid}`, '_blank');
                    });
                }
                const uidHTML = player.uid ? `<br><span class="uid">${player.uid}</span>` : '';
                bubble.innerHTML = `
                    <div class="left">
                        <span class="name">${player.squad ? `[${player.squad}] ` : ''}${player.nick}</span>${uidHTML}
                    </div>
                    <div class="right">
                        Kills Elo: ${player.killsELO.toFixed(2)}<br>
                        Games Elo: ${player.gamesELO.toFixed(2)}<br>
                        Wins: ${player.wins}
                    </div>
                `;
                if (teamAMap.has(idx)) {
                    teamA.appendChild(bubble);
                    sumKillsA += player.killsELO;
                    sumGamesA += player.gamesELO;
                    sumWinsA += player.wins;
                } else {
                    teamB.appendChild(bubble);
                    sumKillsB += player.killsELO;
                    sumGamesB += player.gamesELO;
                    sumWinsB += player.wins;
                }
            });

            const diffKills = Math.abs(sumKillsA - sumKillsB).toFixed(2);
            const diffGames = Math.abs(sumGamesA - sumGamesB).toFixed(2);
            const diffWins = Math.abs(sumWinsA - sumWinsB).toFixed(0);

            balances.innerHTML = `
                Balance Difference (Kills ELO): ${diffKills}<br>
                Balance Difference (Games ELO): ${diffGames}<br>
                Balance Difference (Wins): ${diffWins}
            `;
            resultsDiv.style.display = 'flex';
        }

        function resetUI() {
            progressDiv.style.display = 'none';
            progBar.value = 0;
            goBtn.disabled = false;
        }
    </script>
</body>
</html>
